<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="max-w-xl mx-auto mt-10">

    <h2 class="text-2xl mb-6">Create Ticket</h2>

    <form method="POST" class="space-y-4">

        <input name="issue_type" placeholder="Issue Type"
               class="w-full px-4 py-2 rounded text-black">

        <textarea name="description" placeholder="Description"
                  class="w-full px-4 py-2 rounded text-black"></textarea>

        <select name="priority" class="w-full px-4 py-2 rounded text-black">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button class="bg-blue-500 px-4 py-2 rounded">Submit</button>

    </form>

</div>

</body>
</html>
