<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h2>Create Ticket</h2>

    <form method="POST">
        <input name="issue_type" class="form-control mb-3" placeholder="Issue Type" required>
        <textarea name="description" class="form-control mb-3" placeholder="Description"></textarea>

        <select name="priority" class="form-control mb-3">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button class="btn btn-success">Submit</button>
    </form>

</div>

</body>
</html>
