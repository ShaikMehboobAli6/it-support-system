<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="p-10">
    <h1 class="text-2xl mb-6">Logs Summary</h1>

    {% for key, value in summary.items() %}
        <p>{{ key }} : {{ value }}</p>
    {% endfor %}

</div>

</body>
</html>
