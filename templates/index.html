<!DOCTYPE html>
<html>
<head>
    <title>IT Support System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="flex">

    <!-- Sidebar -->
    <div class="w-64 h-screen bg-gray-800 p-5">
        <h2 class="text-xl font-bold mb-6">IT System</h2>

        <a href="/" class="block mb-3 hover:text-blue-400">Dashboard</a>
        <a href="/create" class="block mb-3 hover:text-blue-400">Create Ticket</a>
        <a href="/monitor" class="block mb-3 hover:text-blue-400">Monitor</a>
        <a href="/logs" class="block hover:text-blue-400">Logs</a>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6">

        <h1 class="text-3xl font-bold mb-6">Dashboard</h1>

        <!-- Tickets -->
        <div class="grid gap-4">
            {% for ticket in tickets %}
            <div class="bg-gray-800 p-5 rounded-xl shadow-lg border border-gray-700">

                <div class="flex justify-between">
                    <h3 class="text-lg font-semibold">
                        {{ ticket['issue_type'] }}
                    </h3>

                    <span class="
                        px-3 py-1 rounded text-sm
                        {% if ticket['priority'] == 'High' %} bg-red-500
                        {% elif ticket['priority'] == 'Medium' %} bg-yellow-500
                        {% else %} bg-green-500
                        {% endif %}
                    ">
                        {{ ticket['priority'] }}
                    </span>
                </div>

                <p class="text-gray-300 mt-2">
                    {{ ticket['description'] }}
                </p>

                <p class="text-sm text-gray-400 mt-3">
                    Diagnosis: {{ ticket['diagnosis'] }}
                </p>

            </div>
            {% endfor %}
        </div>

    </div>

</div>

</body>
</html>
